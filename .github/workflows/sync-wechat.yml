name: Upload Banner to WeChat

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  upload-banner:
    # 只在 PR 被合并时触发
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Find changed posts with banner images
        id: find_posts
        run: |
          # 找本次 PR 新增或修改的 blog 目录下的 banner 图
          git diff --name-only HEAD~1 HEAD \
            | grep '^content/blog/' \
            | grep -E '\.(jpg|jpeg|png)$' \
            | grep -i 'banner\|imgs/' \
            | head -10 > /tmp/changed_banners.txt || true

          # 同时找有变更的 index.md，从中定位 banner
          git diff --name-only HEAD~1 HEAD \
            | grep '^content/blog/' \
            | grep 'index\.md$' \
            | head -5 > /tmp/changed_posts.txt || true

          echo "=== 变更的 banner 图 ==="
          cat /tmp/changed_banners.txt
          echo "=== 变更的文章 ==="
          cat /tmp/changed_posts.txt

          BANNER_COUNT=$(wc -l < /tmp/changed_banners.txt)
          POST_COUNT=$(wc -l < /tmp/changed_posts.txt)
          echo "banner_count=$BANNER_COUNT" >> $GITHUB_OUTPUT
          echo "post_count=$POST_COUNT"     >> $GITHUB_OUTPUT

      - name: Upload banners to WeChat material library
        if: steps.find_posts.outputs.banner_count != '0' || steps.find_posts.outputs.post_count != '0'
        env:
          WX_APPID: ${{ secrets.WX_APPID }}
          WX_APPSECRET: ${{ secrets.WX_APPSECRET }}
        run: |
          SUCCESS=0
          FAIL=0
          RESULTS=""

          # 优先通过 index.md 定位 banner（更准确）
          while IFS= read -r post_file; do
            [ -z "$post_file" ] && continue
            echo "==> 处理文章: $post_file"
            OUTPUT=$(python3 .github/scripts/upload_banner_to_wechat.py \
                       --post-file "$post_file" 2>&1) || true
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "上传完成"; then
              SUCCESS=$((SUCCESS+1))
              TITLE=$(grep "文章:" <<< "$OUTPUT" | sed 's/.*文章: //')
              URL=$(echo "$OUTPUT" | grep '"url"' | grep -o '"url": *"[^"]*"' | head -1)
              RESULTS="$RESULTS\n✅ $TITLE"
            else
              FAIL=$((FAIL+1))
            fi
          done < /tmp/changed_posts.txt

          # 若没有 index.md 变更但有直接变更的 banner 图
          if [ "$SUCCESS" -eq 0 ]; then
            while IFS= read -r banner_file; do
              [ -z "$banner_file" ] && continue
              echo "==> 直接上传 banner: $banner_file"
              OUTPUT=$(python3 .github/scripts/upload_banner_to_wechat.py \
                         --image "$banner_file" \
                         --title "$(basename $(dirname $(dirname $banner_file)))" 2>&1) || true
              echo "$OUTPUT"
              if echo "$OUTPUT" | grep -q "上传完成"; then
                SUCCESS=$((SUCCESS+1))
              else
                FAIL=$((FAIL+1))
              fi
            done < /tmp/changed_banners.txt
          fi

          echo ""
          echo "================================================"
          echo "✅ Banner 上传完成: 成功 $SUCCESS 张，失败 $FAIL 张"
          echo "📌 前往公众号素材库选用: https://mp.weixin.qq.com/cgi-bin/appmsgpicture"
          echo "================================================"

      - name: No banners to upload
        if: steps.find_posts.outputs.banner_count == '0' && steps.find_posts.outputs.post_count == '0'
        run: echo "本次 PR 没有新增/修改 blog banner，跳过上传"
